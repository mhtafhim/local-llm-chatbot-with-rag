<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LM Studio Chat + RAG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #212121; color: #e8e8e8; display: flex; height: 100vh; overflow: hidden;
  }
  #sidebar {
    width: 260px; background: #171717; display: flex; flex-direction: column;
    border-right: 1px solid #2f2f2f; flex-shrink: 0;
  }
  #newChatBtn {
    margin: 10px; padding: 10px; background: transparent; border: 1px solid #444;
    color: #e8e8e8; border-radius: 8px; cursor: pointer; font-size: 14px; text-align: left;
  }
  #newChatBtn:hover { background: #2a2a2a; }
  #chatList { flex: 1; overflow-y: auto; padding: 0 6px; }
  .chatItem {
    padding: 10px 10px; margin: 2px 0; border-radius: 8px; cursor: pointer;
    font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
  }
  .chatItem:hover { background: #2a2a2a; }
  .chatItem.active { background: #343434; }
  .chatItem .del { opacity: 0; font-size: 12px; color: #999; }
  .chatItem:hover .del { opacity: 1; }
  .chatItem .del:hover { color: #f66; }

  #docsSection { border-top: 1px solid #2f2f2f; padding: 10px; }
  #docsSection h4 { margin: 0 0 8px; font-size: 12px; color: #999; text-transform: uppercase; }
  #docList { max-height: 140px; overflow-y: auto; font-size: 12px; color: #ccc; margin-bottom: 8px; }
  #docList div { padding: 3px 0; border-bottom: 1px solid #262626; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #uploadBtn {
    width: 100%; padding: 8px; background: #2f2f2f; border: 1px dashed #555;
    color: #ccc; border-radius: 8px; cursor: pointer; font-size: 12px;
  }
  #uploadBtn:hover { background: #383838; }
  #fileInput { display: none; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header {
    padding: 10px 16px; background: #212121; border-bottom: 1px solid #2f2f2f;
    font-size: 14px; color: #aaa; display: flex; justify-content: space-between; align-items: center;
  }
  #ragToggle { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
  #ragToggle input { cursor: pointer; }

  #chat { flex: 1; overflow-y: auto; padding: 20px 0; }
  .row { padding: 14px 20px; max-width: 780px; margin: 0 auto; }
  .row.user { display: flex; justify-content: flex-end; }
  .bubble.user {
    background: #2f2f2f; padding: 10px 14px; border-radius: 16px; max-width: 75%;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .bubble.assistant { line-height: 1.6; }
  .bubble.assistant pre {
    background: #0d0d0d; border-radius: 8px; padding: 12px 14px; overflow-x: auto;
    position: relative; margin: 10px 0; font-size: 13px;
  }
  .bubble.assistant code { font-family: "SF Mono", Consolas, monospace; }
  .bubble.assistant :not(pre) > code {
    background: #333; padding: 2px 5px; border-radius: 4px; font-size: 0.9em;
  }
  .copyBtn {
    position: absolute; top: 6px; right: 6px; background: #2f2f2f; border: none;
    color: #ccc; font-size: 11px; padding: 4px 8px; border-radius: 5px; cursor: pointer;
  }
  .copyBtn:hover { background: #444; }
  .bubble.assistant p { margin: 6px 0; }
  .sources {
    margin-top: 8px; font-size: 11px; color: #888; border-top: 1px solid #333; padding-top: 6px;
  }
  .sources span { background: #2f2f2f; padding: 2px 8px; border-radius: 10px; margin-right: 6px; }

  #inputBar { padding: 14px 20px 20px; }
  #inputInner { max-width: 780px; margin: 0 auto; display: flex; gap: 8px; background: #2f2f2f; border-radius: 16px; padding: 10px; }
  #userInput {
    flex: 1; resize: none; background: transparent; border: none; color: #e8e8e8;
    font-size: 14px; font-family: inherit; height: 24px; max-height: 160px; outline: none; padding: 4px 8px;
  }
  #sendBtn {
    background: #e8e8e8; border: none; color: #111; width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 16px; flex-shrink: 0;
  }
  #sendBtn:disabled { background: #555; color: #999; cursor: not-allowed; }
  #status { font-size: 11px; color: #777; text-align: center; padding-bottom: 6px; }
</style>
</head>
<body>

<div id="sidebar">
  <button id="newChatBtn" onclick="newChat()">+ New Chat</button>
  <div id="chatList"></div>
  <div id="docsSection">
    <h4>📄 Documents (RAG)</h4>
    <div id="docList"></div>
    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">+ Upload PDF / DOCX / TXT</button>
    <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" multiple onchange="uploadFiles(this.files)">
  </div>
</div>

<div id="main">
  <header>
    <span>🖥️ LM Studio Chat</span>
    <label id="ragToggle">
      <input type="checkbox" id="ragCheckbox" checked> Use RAG
    </label>
    <span id="modelStatus">connecting...</span>
  </header>
  <div id="chat"></div>
  <div id="inputBar">
    <div id="status"></div>
    <div id="inputInner">
      <textarea id="userInput" placeholder="Message LM Studio..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// Direct LM Studio (used only for model name display / fallback)
const LM_STUDIO_BASE = "http://192.168.10.40:1234/v1";
// RAG backend (FastAPI server you run with start.bat)
const RAG_BACKEND = "http://192.168.10.40:8001";

const chatEl = document.getElementById("chat");
const modelStatus = document.getElementById("modelStatus");
const inputEl = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const chatListEl = document.getElementById("chatList");
const docListEl = document.getElementById("docList");
const ragCheckbox = document.getElementById("ragCheckbox");

let chats = JSON.parse(localStorage.getItem("lmstudio_chats") || "{}");
let activeChatId = localStorage.getItem("lmstudio_active_chat");

if (!activeChatId || !chats[activeChatId]) {
  activeChatId = createChatObj();
}

function createChatObj() {
  const id = "chat_" + Date.now();
  chats[id] = { title: "New Chat", messages: [] };
  saveChats();
  return id;
}
function saveChats() {
  localStorage.setItem("lmstudio_chats", JSON.stringify(chats));
  localStorage.setItem("lmstudio_active_chat", activeChatId);
}
function newChat() {
  activeChatId = createChatObj();
  saveChats(); renderSidebar(); renderMessages();
}
function switchChat(id) {
  activeChatId = id;
  saveChats(); renderSidebar(); renderMessages();
}
function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm("Delete this chat?")) return;
  delete chats[id];
  if (activeChatId === id) {
    const remaining = Object.keys(chats);
    activeChatId = remaining.length ? remaining[0] : createChatObj();
  }
  saveChats(); renderSidebar(); renderMessages();
}
function renderSidebar() {
  chatListEl.innerHTML = "";
  Object.keys(chats).reverse().forEach(id => {
    const div = document.createElement("div");
    div.className = "chatItem" + (id === activeChatId ? " active" : "");
    div.onclick = () => switchChat(id);
    div.innerHTML = `<span>${escapeHtml(chats[id].title)}</span><span class="del" onclick="deleteChat('${id}', event)">✕</span>`;
    chatListEl.appendChild(div);
  });
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function renderMessages() {
  chatEl.innerHTML = "";
  chats[activeChatId].messages.forEach(m => addBubble(m.role, m.content, false, m.sources));
  chatEl.scrollTop = chatEl.scrollHeight;
}
function renderMarkdown(text) {
  const html = marked.parse(text || "");
  const wrapper = document.createElement("div");
  wrapper.innerHTML = html;
  wrapper.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
    const pre = block.parentElement;
    const btn = document.createElement("button");
    btn.className = "copyBtn";
    btn.textContent = "Copy";
    btn.onclick = () => {
      navigator.clipboard.writeText(block.textContent);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1200);
    };
    pre.style.position = "relative";
    pre.appendChild(btn);
  });
  return wrapper.innerHTML;
}
function addBubble(role, text, scroll = true, sources = null) {
  const row = document.createElement("div");
  row.className = "row " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;
  if (role === "user") {
    bubble.textContent = text;
  } else {
    bubble.innerHTML = renderMarkdown(text);
    if (sources && sources.length) {
      const src = document.createElement("div");
      src.className = "sources";
      src.innerHTML = "Sources: " + sources.map(s => `<span>${escapeHtml(s)}</span>`).join("");
      bubble.appendChild(src);
    }
  }
  row.appendChild(bubble);
  chatEl.appendChild(row);
  if (scroll) chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}
function autoGrow(el) {
  el.style.height = "24px";
  el.style.height = Math.min(el.scrollHeight, 160) + "px";
}
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function detectModel() {
  try {
    const res = await fetch(`${LM_STUDIO_BASE}/models`);
    const data = await res.json();
    const m = data?.data?.find(x => !x.id.toLowerCase().includes("embed"));
    modelStatus.textContent = m ? m.id : "connected";
  } catch (err) {
    modelStatus.textContent = "⚠️ LM Studio not reachable";
  }
}

async function loadDocs() {
  try {
    const res = await fetch(`${RAG_BACKEND}/documents`);
    const data = await res.json();
    docListEl.innerHTML = "";
    if (!data.documents.length) {
      docListEl.innerHTML = "<div style='color:#666'>No documents yet</div>";
    } else {
      data.documents.forEach(d => {
        const div = document.createElement("div");
        div.textContent = "📄 " + d;
        docListEl.appendChild(div);
      });
    }
  } catch (err) {
    docListEl.innerHTML = "<div style='color:#f66'>RAG backend not running</div>";
  }
}

async function uploadFiles(files) {
  for (const file of files) {
    const formData = new FormData();
    formData.append("file", file);
    try {
      await fetch(`${RAG_BACKEND}/upload`, { method: "POST", body: formData });
    } catch (err) {
      alert("Upload failed: " + err.message);
    }
  }
  loadDocs();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  autoGrow(inputEl);
  sendBtn.disabled = true;

  const chatObj = chats[activeChatId];
  chatObj.messages.push({ role: "user", content: text });
  if (chatObj.title === "New Chat") {
    chatObj.title = text.slice(0, 30) + (text.length > 30 ? "..." : "");
  }
  addBubble("user", text);
  saveChats();
  renderSidebar();

  const assistantBubble = addBubble("assistant", "");
  let fullReply = "";
  let sources = [];

  try {
    const useRag = ragCheckbox.checked;
    let res;
    let usedFallback = false;

    try {
      res = await fetch(`${RAG_BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: chatObj.messages.map(m => ({ role: m.role, content: m.content })),
          use_rag: useRag
        })
      });
      if (!res.ok) throw new Error("backend error");
    } catch (backendErr) {
      usedFallback = true;
      const modelRes = await fetch(`${LM_STUDIO_BASE}/models`);
      const modelData = await modelRes.json();
      const model = modelData?.data?.find(x => !x.id.toLowerCase().includes("embed"))?.id || "local-model";

      res = await fetch(`${LM_STUDIO_BASE}/chat/completions`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model,
          messages: chatObj.messages.map(m => ({ role: m.role, content: m.content })),
          stream: true
        })
      });
    }

    if (!res.ok || !res.body) throw new Error("Request failed: " + res.status);

    if (usedFallback) {
      const note = document.createElement("div");
      note.className = "sources";
      note.textContent = "⚠️ RAG backend offline — answered directly by LM Studio (no document context)";
      assistantBubble.appendChild(note);
    }

    const sourceHeader = usedFallback ? null : res.headers.get("X-Sources");
    if (sourceHeader) sources = sourceHeader.split(",").filter(Boolean);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data:")) continue;
        const payload = trimmed.slice(5).trim();
        if (payload === "[DONE]") continue;
        try {
          const json = JSON.parse(payload);
          const delta = json?.choices?.[0]?.delta?.content;
          if (delta) {
            fullReply += delta;
            assistantBubble.innerHTML = renderMarkdown(fullReply);
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        } catch (e) {}
      }
    }

    if (sources.length) {
      const src = document.createElement("div");
      src.className = "sources";
      src.innerHTML = "Sources: " + sources.map(s => `<span>${escapeHtml(s)}</span>`).join("");
      assistantBubble.appendChild(src);
    }

    chatObj.messages.push({ role: "assistant", content: fullReply, sources });
    saveChats();

  } catch (err) {
    assistantBubble.innerHTML = "⚠️ Error: " + err.message + "<br><small>Is the RAG backend (start.bat) running?</small>";
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

renderSidebar();
renderMessages();
detectModel();
loadDocs();
</script>

</body>
</html>
