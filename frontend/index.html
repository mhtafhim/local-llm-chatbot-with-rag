<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tafhim's Chat + RAG</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="overlay"></div>
  <aside id="sidebar">
    <button id="newChatBtn" type="button">+ New Chat</button>
    <div id="chatList"></div>
    <section id="docsSection">
      <h4>Documents (RAG)</h4>
      <div id="docList"></div>
      <button id="uploadBtn" type="button">+ Upload PDF / DOCX / TXT</button>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" multiple>
      <button id="clearDbBtn" type="button">Clear All Documents</button>
    </section>
  </aside>

  <main id="main">
    <header>
      <button id="menuBtn" type="button" aria-label="Open sidebar">☰</button>
      <span>Tafhim's Chat</span>
      <span id="modelStatus">connecting...</span>
    </header>

    <div id="chat"></div>

    <div id="inputBar">
      <div id="status"></div>
      <div id="inputWrapper">
        <div id="toolPills">
          <button id="ragPill" class="pill active" type="button">RAG</button>
          <button id="webPill" class="pill" type="button">Web Search</button>
        </div>
        <div id="inputInner">
          <textarea id="userInput" placeholder="Message Tafhim's Chat..."></textarea>
          <button id="stopBtn" type="button" aria-label="Stop response" hidden>■</button>
          <button id="sendBtn" type="button">➤</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
