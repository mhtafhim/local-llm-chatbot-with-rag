services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/docs:/app/docs
    env_file:
      - backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  chroma_data:
